<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal</title>
    
    <!-- ഇത് തനിയെ നിങ്ങളുടെ യഥാർത്ഥ ഗൂഗിൾ ലിങ്കിലേക്ക് കൊണ്ടുപോകും -->
    <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbwpaXjVKwhuJ0YcpoT5531CvxfevHrPcHqUlKuwwkMOZsTj1-zVlljdeYZ1r2SuURky/exec">
    
    <style>
        body {
            background-color: #0a0e1a;
            color: #00d2ff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .spinner {
            width: 50px; 
            height: 50px;
            border: 5px solid rgba(0, 210, 255, 0.2);
            border-top: 5px solid #00d2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <div class="spinner"></div>
        <h2>Loading Portal...</h2>
        <p style="font-size: 13px; color: #ccc;">Redirecting to secure server...</p>
    </div>

    <!-- സുരക്ഷയ്ക്കായി ജാവാസ്ക്രിപ്റ്റ് വഴിയുള്ള റീഡയറക്ട് കൂടി ചേർക്കുന്നു -->
    <script>
        setTimeout(function() {
            window.location.replace("https://script.google.com/macros/s/AKfycbwpaXjVKwhuJ0YcpoT5531CvxfevHrPcHqUlKuwwkMOZsTj1-zVlljdeYZ1r2SuURky/exec");
        }, 500);
    </script>
</body>
</html>
