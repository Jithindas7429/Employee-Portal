<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Employee Portal</title>
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignal.SDK.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "17637010-2c59-46b5-88fb-9379dd943cef",
          notifyButton: { enable: true },
          
          // ---> ഇതാണ് GitHub Pages-ലെ ഫോൾഡർ പ്രശ്നം മാറ്റാനുള്ള മാജിക് കോഡ് <---
          serviceWorkerParam: { scope: '/Employee-Portal/' },
          serviceWorkerPath: '/Employee-Portal/OneSignalSDKWorker.js'
        });
        OneSignal.Slidedown.promptPush();
      });
    </script>

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #1a2a6c;
        }
        iframe {
            width: 100%; height: 100%; border: none;
        }
    </style>
</head>
<body>
    
    <iframe id="appFrame" src="https://script.google.com/macros/s/AKfycbwpaXjVKwhuJ0YcpoT5531CvxfevHrPcHqUlKuwwkMOZsTj1-zVlljdeYZ1r2SuURky/exec"></iframe>

    <script>
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'REGISTER_TOKEN') {
                
                let token = OneSignal.User.PushSubscription.id;
                
                // ടോക്കൺ ഇല്ലെങ്കിൽ (സബ്സ്ക്രൈബ് ആയിട്ടില്ലെങ്കിൽ) വെറുതെ ഷീറ്റിലേക്ക് അയക്കുന്നത് തടയുന്നു!
                if (!token) return;
                
                let savedToken = localStorage.getItem("syncedTokenWeb");
                
                if (token !== savedToken) {
                    localStorage.setItem("syncedTokenWeb", token);
                    let gasUrl = "https://script.google.com/macros/s/AKfycbwpaXjVKwhuJ0YcpoT5531CvxfevHrPcHqUlKuwwkMOZsTj1-zVlljdeYZ1r2SuURky/exec";
                    document.getElementById('appFrame').src = gasUrl + "?token=" + token;
                } else {
                    console.log("Web Token unchanged. Skipping Sheet update.");
                }
            }
        });
    </script>
</body>
</html>
